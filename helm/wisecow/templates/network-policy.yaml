{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "wisecow.fullname" . }}
  labels:
    {{- include "wisecow.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "wisecow.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from ingress controller and prometheus
    - from:
        - namespaceSelector: {}
  egress:
    # Allow all egress (e.g. DNS)
    - to:
      - namespaceSelector: {}
{{- end }}
