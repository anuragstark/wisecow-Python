replicaCount: 3

image:
  repository: ghcr.io/anuragstark/wisecow-python
  pullPolicy: Always
  tag: "latest"

imagePullSecrets:
  - name: ghcr-secret
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 4499

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: checkmypro.online
      paths:
        - path: /
          pathType: Prefix
    - host: www.checkmypro.online
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: wisecow-tls
      hosts:
        - checkmypro.online
        - www.checkmypro.online

resources:
  requests:
    memory: "128Mi"
    cpu: "250m"
  limits:
    memory: "256Mi"
    cpu: "500m"

securityContext:
  runAsNonRoot: false
  runAsUser: 0
  capabilities:
    drop: ["ALL"]
    
podSecurityContext:
  fsGroup: 2000

networkPolicy:
  enabled: true

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  # targetMemoryUtilizationPercentage: 80
