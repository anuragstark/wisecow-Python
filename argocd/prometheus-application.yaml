apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    chart: kube-prometheus-stack
    targetRevision: 60.1.0 # Use a stable chart version
    helm:
      releaseName: prometheus
      values: |
        alertmanager:
          config:
            global:
              smtp_smarthost: 'smtp.gmail.com:587'
              smtp_from: 'alertmanager@checkmypro.online'
              smtp_auth_username: 'anuragchauhan536@gmail.com'
              smtp_auth_identity: 'anuragchauhan536@gmail.com'
              smtp_auth_password_file: /etc/alertmanager/secrets/alertmanager-smtp/password
            route:
              group_by: ['alertname']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 1h
              receiver: 'email-notifications'
              routes:
                - matchers:
                  - severity="critical"
                  receiver: 'email-notifications'
            receivers:
            - name: 'email-notifications'
              email_configs:
              - to: 'anuragchauhan536@gmail.com'
                send_resolved: true
          alertmanagerSpec:
            secrets:
              - alertmanager-smtp
        grafana:
          adminUser: wisecow
          adminPassword: wisecow
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: "letsencrypt-prod"
              nginx.ingress.kubernetes.io/ssl-redirect: "true"
            hosts:
              - grafana.checkmypro.online
            tls:
              - secretName: grafana-secret-tls
                hosts:
                  - grafana.checkmypro.online
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
